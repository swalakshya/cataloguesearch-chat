services:
  chat-service:
    build:
      context: ./service
      dockerfile: Dockerfile
    container_name: cataloguesearch-chat-service
    env_file:
      - ./service/.env.local
    ports:
      - "${CHAT_SERVICE_PORT:-8012}:8012"
    restart: ${RESTART_POLICY:-no}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
